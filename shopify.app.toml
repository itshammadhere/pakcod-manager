name = "PakCOD Manager"
client_id = "fc68177c4f82f20e2e7ec196c4901e7d"
application_url = "https://pakcod-app-production.up.railway.app"
embedded = true

[access_scopes]
scopes = "read_orders,write_orders,read_products,write_products,read_inventory,write_inventory,write_fulfillments"

[auth]
redirect_urls = ["https://pakcod-app-production.up.railway.app/auth/callback"]

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = ["app/scopes_update"]
  uri = "/webhooks/app/scopes_update"
